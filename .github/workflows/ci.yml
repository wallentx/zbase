name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            g++ \
            libasound2-dev \
            libavcodec-dev \
            libavdevice-dev \
            libavfilter-dev \
            libavformat-dev \
            libavutil-dev \
            libfontconfig-dev \
            libfreetype6-dev \
            libswresample-dev \
            libswscale-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-x11-dev \
            pkg-config

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-features --all-targets --locked -- -D warnings

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-latest
          - name: macOS
            runner: macos-latest
          - name: Windows
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            g++ \
            libasound2-dev \
            libavcodec-dev \
            libavdevice-dev \
            libavfilter-dev \
            libavformat-dev \
            libavutil-dev \
            libfontconfig-dev \
            libfreetype6-dev \
            libswresample-dev \
            libswscale-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-x11-dev \
            pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake ffmpeg pkg-config
          echo "FFMPEG_DIR=$(brew --prefix ffmpeg)" >> "$GITHUB_ENV"

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "ffmpeg.zip"
          $extract = Join-Path $env:RUNNER_TEMP "ffmpeg"
          Invoke-WebRequest `
            -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip" `
            -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $extract

          $ffmpegDir = Get-ChildItem -Path $extract -Directory | Select-Object -First 1 -ExpandProperty FullName
          "FFMPEG_DIR=$ffmpegDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$ffmpegDir\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          $clang = Get-Command clang.exe -ErrorAction SilentlyContinue
          if ($clang) {
            $llvmBin = Split-Path $clang.Source -Parent
          } elseif (Test-Path "C:\Program Files\LLVM\bin\clang.exe") {
            $llvmBin = "C:\Program Files\LLVM\bin"
          } else {
            throw "clang.exe not found on the runner"
          }
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build workspace
        run: cargo build --workspace --all-features --all-targets --locked

  checks:
    name: Checks
    if: always()
    needs:
      - lint
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Verify required jobs passed
        run: |
          echo "lint:  ${{ needs.lint.result }}"
          echo "build: ${{ needs.build.result }}"
          test "${{ needs.lint.result }}" = "success"
          test "${{ needs.build.result }}" = "success"
